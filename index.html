<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Forte, Futuro Sustentável</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        html { scroll-behavior: smooth; }
        article, .card-transicao { transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out; }
        article:hover, .card-transicao:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <header class="bg-emerald-950 text-white py-16 px-6 text-center relative">
        <div class="max-w-4xl mx-auto">
            <span class="bg-emerald-600 text-xs font-bold uppercase px-3 py-1 rounded-full">Paraná Sustentável</span>
            <h1 class="text-4xl md:text-6xl font-extrabold mt-4 mb-2">Agro Forte, Futuro Sustentável</h1>
            <p class="text-xl md:text-2xl text-emerald-200 font-light">O equilíbrio perfeito entre a produção e o meio ambiente.</p>
        </div>
    </header>

                    <span id="temp-curitiba" class="text-xl font-black text-gray-900">--°C</span>
                    <span id="ur-curitiba" class="text-[10px] text-emerald-700 font-semibold bg-emerald-100 px-2 py-0.5 rounded-full mt-1">UR: --%</span>
                </div>

                <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 flex flex-col items-center shadow-sm">
                    <span class="font-bold text-gray-700 block text-sm">Cascavel</span>

                    <span id="temp-londrina" class="text-xl font-black text-gray-900">--°C</span>
                    <span id="ur-londrina" class="text-[10px] text-emerald-700 font-semibold bg-emerald-100 px-2 py-0.5 rounded-full mt-1">UR: --%</span>
                </div>

                <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 flex flex-col items-center shadow-sm">
                    <span class="font-bold text-gray-700 block text-sm">Maringá</span>
                    <div id="icon-maringa"><i class="fa-solid fa-circle-notch fa-spin text-emerald-600 text-2xl my-2"></i></div>
                    <span id="temp-maringa" class="text-xl font-black text-gray-900">--°C</span>
                    <span id="ur-maringa" class="text-[10px] text-emerald-700 font-semibold bg-emerald-1
